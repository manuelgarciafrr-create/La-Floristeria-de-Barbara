<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Floristería de Bárbara</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --fondo-rosado: #FFF0F5;
            --rosa-claro: #FCE4EC;
            --blush: #F48FB1;
            --texto: #704F4F;
            --radius: 20px;
            --gap: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--fondo-rosado);
            color: var(--texto);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
        }

        .logo-container {
            padding: 30px 20px 10px;
            text-align: center;
            background: var(--fondo-rosado);
        }

        /* Ajuste del logo para que se vea impecable */
        .logo-placeholder {
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
            background-color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--blush);
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(244, 143, 177, 0.2);
        }

        .logo-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Mantiene la proporción del logo */
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            font-style: italic;
            font-size: 1.6rem;
            color: var(--blush);
            letter-spacing: 1px;
        }

        nav {
            position: sticky;
            top: 0;
            background: rgba(255, 240, 245, 0.9);
            backdrop-filter: blur(8px);
            z-index: 100;
            padding: 10px 0;
            display: flex;
            justify-content: center;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            border-bottom: 1px solid rgba(244, 143, 177, 0.2);
        }

        nav::-webkit-scrollbar { display: none; }

        .nav-inner {
            display: flex;
            margin: 0 auto;
            padding: 0 15px;
        }

        .filter-btn {
            font-family: 'Playfair Display', serif;
            background: none;
            border: none;
            padding: 8px 18px;
            font-size: 0.9rem;
            color: var(--texto);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .filter-btn.active {
            color: var(--blush);
            font-weight: 600;
            border-bottom: 2px solid var(--blush);
        }

        .gallery-container {
            padding: var(--gap);
            max-width: 1200px;
            margin: 0 auto;
        }

        .masonry-grid {
            column-count: 2;
            column-gap: var(--gap);
        }

        @media (min-width: 768px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 4; } }

        .item {
            break-inside: avoid;
            margin-bottom: var(--gap);
            border-radius: var(--radius);
            overflow: hidden;
            background-color: white;
            box-shadow: 0 5px 15px rgba(244, 143, 177, 0.1);
            animation: fadeIn 0.5s ease-in forwards;
            cursor: pointer;
        }

        .item img {
            width: 100%;
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #lightbox {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 240, 245, 0.98);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 15px;
        }

        #lightbox img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 35px;
            color: var(--blush);
            cursor: pointer;
            line-height: 1;
            font-family: Arial, sans-serif;
            z-index: 1001;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <div class="logo-placeholder">
            <img src="https://i.ibb.co/WWbwnX5D/IMG-20260419-231649.jpg" alt="Logo La Floristería de Bárbara">
        </div>
        <h1>La Floristería de Bárbara</h1>
    </div>

    <nav>
        <div class="nav-inner">
            <button class="filter-btn active" onclick="filterGallery('Todas')">Todas</button>
            <button class="filter-btn" onclick="filterGallery('Rosas')">Rosas</button>
            <button class="filter-btn" onclick="filterGallery('Girasoles')">Girasoles</button>
            <button class="filter-btn" onclick="filterGallery('Tulipanes')">Tulipanes</button>
        </div>
    </nav>

    <main class="gallery-container">
        <div class="masonry-grid" id="main-gallery"></div>
    </main>

    <div id="lightbox" onclick="this.style.display='none'">
        <span class="close-btn">&times;</span>
        <img src="" alt="Zoom">
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSffP7BafJvW7W57fmcBo3vkVX7_i9_dVomx_-eONFJHQ5yjwWEVmz1YhNGTiGr5rbGy7-Hy-LmWDjq/pub?output=csv';

        let flowers = [];

        async function loadGallery() {
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                
                flowers = rows.map(row => {
                    const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return {
                        category: columns[1]?.replace(/"/g, '').trim(),
                        img: columns[3]?.replace(/"/g, '').trim()
                    };
                }).filter(f => f.img && f.img.startsWith('http'));

                renderGallery(flowers);
            } catch (e) {
                console.error("Error cargando el CSV:", e);
            }
        }

        function renderGallery(items) {
            const grid = document.getElementById('main-gallery');
            grid.innerHTML = '';

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item';
                card.innerHTML = `<img src="${item.img}" loading="lazy">`;
                card.onclick = (e) => {
                    e.stopPropagation();
                    const lb = document.getElementById('lightbox');
                    lb.querySelector('img').src = item.img;
                    lb.style.display = 'flex';
                };
                grid.appendChild(card);
            });
        }

        function filterGallery(cat) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toUpperCase() === cat.toUpperCase());
            });

            if (cat === 'Todas') {
                renderGallery(flowers);
            } else {
                const filtered = flowers.filter(f => f.category && f.category.toLowerCase() === cat.toLowerCase());
                renderGallery(filtered);
            }
        }

        window.onload = loadGallery;
    </script>
</body>
</html>
